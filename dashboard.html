<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Меня</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card form-card">
        <div class="form-row">
            <div class="input-group">
                <label>Назва витрати</label>
                <input type="text" placeholder="наприклад, Продукти">
            </div>
            <div class="input-group">
                <label>Сума (₴)</label>
                <div class="amount">
                    <span>₴</span>
                    <input type="number" placeholder="0.00">
                </div>
            </div>
            <div class="input-group">
                <label>Категорія</label>
                <select>
                    <option>Їжа</option>
                    <option>Транспорт</option>
                    <option>Розваги</option>
                    <option>Здоров'я</option>
                    <option>Інше</option>
                </select>
            </div>
        </div>
        <button class="btn">Додати витрату</button>
    </div>
    <h2>Список витрат</h2>
    <div class="card total">
        Загальна сума: ₴0.00
    </div>
    <div class="card item">
        <span>Назва витрати</span>
        <span class="badge green">Їжа</span>
        <span class="price">15 000 ₴</span>
    </div>
    <div class="card item">
        <span>Назва витрати</span>
        <span class="badge green">Транспорт</span>
        <span class="price">10 000 ₴</span>
    </div>
    <div class="card item">
        <span>Назва витрати</span>
        <span class="badge red">Розваги</span>
        <span class="price">12 000 ₴</span>
    </div>
    <div class="card item">
        <span>Назва витрати</span>
        <span class="badge green">Розваги</span>
        <span class="price">22 000 ₴</span>
    </div>
    <div class="card item">
        <span>Назва витрати</span>
        <span class="badge green">Здоров'я</span>
        <span class="price">43 000 ₴</span>
    </div>
</div>
</body>
</html>
