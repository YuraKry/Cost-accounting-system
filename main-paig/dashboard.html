<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Меня</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
<div class="container">
    <div class="card form-card">
        <div class="form-row">
            <div class="input-group">
                <label>Назва витрати</label>
                <input type="text" placeholder="наприклад, Продукти">
            </div>
            <div class="input-group">
                <label>Сума (₴)</label>
                <div class="amount">
                    <span>₴</span>
                    <input type="number" placeholder="0.00">
                </div>
            </div>
            <div class="input-group">
                <label>Категорія</label>
                <select>
                    <option>Їжа</option>
                    <option>Транспорт</option>
                    <option>Розваги</option>
                    <option>Здоров'я</option>
                    <option>Інше</option>
                </select>
            </div>
        </div>
        <button class="btn">Додати витрату</button>
    </div>
<h2>Список витрат</h2>
    <div class="card total">
        Загальна сума: ₴0.00
    </div>
</div> 
<script src="script2.js"></script>
</body>
</html>
